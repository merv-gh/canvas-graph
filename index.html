<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D ECS Graph — Event-Driven Architecture</title>
<script src="/bootstrap.js"></script>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="ui-layer"></div>

<div id="palette" class="modal hidden">
  <input id="palette-input" placeholder="Type a command…" autocomplete="off" spellcheck="false">
  <div id="palette-list" class="list"></div>
</div>

<div id="editor" class="modal hidden">
  <input id="editor-search" placeholder="Search…  (↑/↓ select  ⌥1–9 quick-edit  Enter focus row)" autocomplete="off" spellcheck="false">
  <div id="editor-list" class="list"></div>
  <div class="actions">
    <button id="editor-add">+ Add</button>
    <button id="editor-del">− Delete selected</button>
    <span style="flex:1; color:var(--text-mute); font-size:11px;">Edits save live</span>
    <button id="editor-close" class="primary">Done</button>
  </div>
</div>

<div id="toast"></div>
<div id="jump-layer"></div>

<div id="hud">
  <div>Mode: <span class="mode" id="hud-mode">NORMAL</span></div>
  <kbd>A</kbd> Add &nbsp;<kbd>⇧A</kbd> Sibling &nbsp;<kbd>X</kbd> Delete &nbsp;<kbd>E</kbd> Edit &nbsp;<kbd>C</kbd> Connect &nbsp;<kbd>Space</kbd> Collapse<br>
  <kbd>F</kbd> Fit view &nbsp;<kbd>⇧F</kbd> Fit parent &nbsp;<kbd>J</kbd> Jump (nodes + labels) &nbsp;<kbd>1-3</kbd> Layers &nbsp;<kbd>Arrows</kbd> Pan &nbsp;<kbd>+/-</kbd> Zoom &nbsp;<kbd>L</kbd> Layout (<span id="hud-layout">radial</span>) &nbsp;<kbd>⇧L</kbd> Cycle &nbsp;<kbd>P</kbd> Palette<br>
  <kbd>Alt+Z</kbd> Back &nbsp;Click selected title = rename &nbsp;In connect: just start typing or <kbd>/</kbd>
</div>

<div id="dock">
  <button id="btn-demo">▶ Demo</button>
  <button id="btn-stop" style="display:none;">■ Stop</button>
  <label>Speed</label>
  <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1">
  <span id="speed-val">1.0×</span>
  <button id="btn-edit-palette">⚙ Palette</button>
  <button id="btn-toast">Toast: off</button>
  <button id="btn-theme">Theme: Default</button>
  <button id="btn-case-record">Rec: off</button>
  <button id="btn-case-export">Export Case</button>
  <button id="btn-reset">↺ Reset</button>
</div>

<script src="/app.js"></script>
<script src="/test-harness.js"></script>
</body>
</html>
