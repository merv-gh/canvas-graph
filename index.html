<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D ECS Graph — Event-Driven Architecture</title>
<script>
  (() => {
    const params = new URLSearchParams(location.search);
    if (params.has('screenshot') || params.get('mode') === 'screenshot') {
      document.documentElement.classList.add('screenshot-mode');
    }
  })();
</script>
<style>
  :root {
    --bg: #1c1f2e;
    --bg-2: #232639;
    --panel: rgba(46,50,72,0.92);
    --panel-2: rgba(56,62,86,0.9);
    --border: #3a3f5c;
    --border-2: #4a5074;
    --text: #ecedf3;
    --text-dim: #a8acc4;
    --text-mute: #7a7f9a;
    --accent: #5bd2ff;
    --accent-2: #ffb84d;
    --grid: #2c3050;
    --grid-2: #353a5e;
    --shadow: 0 10px 32px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; }
  body { margin:0; overflow:hidden; background:var(--bg); color:var(--text);
         font-family: system-ui, -apple-system, sans-serif; }
  canvas { position:fixed; inset:0; z-index:0; }

  /* HTML Nodes */
  #ui-layer { position:fixed; inset:0; z-index:1; pointer-events:none; }
  .node { position:absolute; pointer-events:auto; min-width:150px; max-width:280px;
          background:var(--panel); border:1px solid var(--border); border-radius:11px;
          padding:11px 13px; box-shadow:var(--shadow); backdrop-filter:blur(8px);
          cursor:grab; user-select:none; will-change: transform;
          transition: border-color .15s, box-shadow .2s, opacity .2s, background .15s; }
  .node.smooth { transition: border-color .15s, box-shadow .2s, opacity .2s, background .15s, transform .35s cubic-bezier(.2,.8,.2,1); }
  .node:hover { border-color:var(--border-2); background:var(--panel-2); }
  .node.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(91,210,255,0.25), var(--shadow); }
  .node.connecting { border-color:var(--accent-2); box-shadow:0 0 0 2px rgba(255,184,77,0.25), var(--shadow); }
  .node.collapsed .body { display:none; }
  .node.collapsed { background: var(--panel-2); }
  .node.collapsed .title::after { content:' ▸'; color:var(--accent-2); margin-left:4px; }
  .node.has-children .title::before { content:'▾ '; color:var(--text-mute); font-size:10px; }
  .node.has-children.collapsed .title::before { content:'▸ '; color:var(--accent-2); }
  /* Expanded parent reads as a text label floating above its subtree (no card). */
  .node.is-container { background:transparent; border-color:transparent; box-shadow:none;
    backdrop-filter:none; padding:2px 8px; min-width:0; max-width:340px; cursor:pointer; }
  .node.is-container .body { display:none; }
  .node.is-container .title { font-size:13px; letter-spacing:.3px; margin-bottom:0;
    color:var(--accent); font-weight:600; text-shadow:0 1px 3px rgba(0,0,0,0.7); }
  .node.is-container.has-children .title::before { content:'▾ '; color:var(--accent); opacity:.65; }
  .node.is-container:hover .title { color:#fff; }
  .node.is-container.selected { background:rgba(91,210,255,0.10); border-radius:6px; }
  /* Inline edge-label editor */
  .edge-label-edit { position:fixed; transform:translate(-50%,-50%); z-index:80;
    background:rgba(28,32,50,0.96); border:1px solid var(--accent); color:var(--text);
    padding:3px 9px; border-radius:5px; font:600 12px ui-monospace,monospace;
    outline:none; min-width:90px; text-align:center; }
  .node .title { font-weight:600; font-size:14px; color:#fff; margin-bottom:3px; letter-spacing:.1px; }
  .node .body { font-size:12.5px; color:var(--text-dim); line-height:1.45; }
  .node input { background:transparent; border:none; box-shadow:none; color:inherit; font:inherit;
                width:100%; outline:none; padding:0; margin:0; -webkit-appearance:none; appearance:none;
                caret-color: var(--accent); }
  .node input:focus { outline:none; box-shadow:none; border:none; }
  /* Label-jump hint chips */
  #jump-layer { position:fixed; inset:0; z-index:60; pointer-events:none; }
  .jump-hint { position:absolute; background:var(--accent-2); color:#1a1a22; font:600 11px ui-monospace,monospace;
    padding:2px 6px; border-radius:4px; box-shadow:0 3px 10px rgba(0,0,0,0.5); transform:translate(-2px,-50%); }
  .jump-hint.edge { background:#b388ff; color:#1a0a2a; transform:translate(-50%,-50%); }
  .jump-hint.match { background:var(--accent); color:#0a1820; }
  .jump-hint .typed { opacity:.45; }

  /* Modal (palette + editor) */
  .modal { position:fixed; top:14%; left:50%; transform:translateX(-50%);
    width:480px; max-height:68vh; background:rgba(28,32,50,0.97); border:1px solid var(--border);
    border-radius:14px; z-index:100; display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.75); backdrop-filter:blur(16px); pointer-events:auto; }
  .modal.hidden { display:none; }
  .modal input, .modal textarea { width:100%; padding:12px 16px; background:transparent;
    border:none; border-bottom:1px solid var(--border); color:var(--text); font-size:14px; outline:none;
    font-family: inherit; }
  .modal textarea { resize: vertical; min-height:200px; font-family: ui-monospace, monospace; font-size:12.5px; }
  .modal .list { overflow-y:auto; padding:6px; }
  .modal .item { display:flex; justify-content:space-between; align-items:center;
    padding:9px 11px; border-radius:6px; cursor:pointer; color:var(--text-dim); font-size:13px; }
  .modal .item:hover, .modal .item.sel { background:rgba(91,210,255,0.13); color:var(--text); }
  .modal .item .shortcut { color:var(--text-mute); font-family: ui-monospace, monospace; font-size:11px; }
  .modal .actions { display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--border); }
  .modal button { background:var(--panel); color:var(--text); border:1px solid var(--border);
    padding:7px 14px; border-radius:6px; cursor:pointer; font:inherit; font-size:13px; }
  .modal button:hover { background:var(--panel-2); border-color:var(--border-2); }
  .modal button.primary { background:rgba(91,210,255,0.18); border-color:var(--accent); color:var(--accent); }
  /* Editor rows */
  .modal .row { display:grid; grid-template-columns: 30px 1fr 80px 1fr 24px; gap:6px; align-items:center;
    padding:5px 8px; border-radius:6px; cursor:default; }
  .modal .row.sel { background:rgba(91,210,255,0.10); }
  .modal .row .num { color:var(--text-mute); font-family:monospace; font-size:10.5px; text-align:right; }
  .modal .row .ed { background:transparent; color:var(--text); border:1px solid transparent; border-radius:4px;
    padding:4px 6px; font:inherit; font-size:12.5px; outline:none; width:100%; }
  .modal .row .ed:hover { border-color:var(--border); }
  .modal .row .ed:focus { border-color:var(--accent); background:rgba(0,0,0,0.18); }
  .modal .row .ed.mono { font-family:ui-monospace,monospace; font-size:11.5px; color:var(--text-dim); }
  .modal .row .del { background:transparent; border:none; color:var(--text-mute); cursor:pointer; padding:2px 6px; font-size:14px; line-height:1; }
  .modal .row .del:hover { color:#ff7a7a; }

  /* Toast */
  #toast { position:fixed; top:12px; right:12px; z-index:50; display:flex; flex-direction:column; gap:5px;
    pointer-events:none; max-width:340px; }
  .toast-item { background:rgba(28,32,50,0.92); border:1px solid var(--border); border-radius:6px;
    padding:5px 9px; font-size:11.5px; font-family: ui-monospace, SFMono-Regular, monospace;
    color:var(--text-dim); animation:slideIn .18s ease; line-height:1.4; }
  .toast-item .t { color:var(--text-mute); margin-right:6px; }
  .toast-item .n { color:var(--accent); font-weight:600; }
  .toast-item .m { color:var(--text-mute); }
  @keyframes slideIn { from{opacity:0;transform:translateX(12px);} to{opacity:1;transform:none;} }

  /* HUD */
  #hud { position:fixed; bottom:12px; left:12px; z-index:40; color:var(--text-dim); font-size:11.5px;
    line-height:1.7; pointer-events:none; max-width:60%; }
  #hud kbd { background:var(--bg-2); border:1px solid var(--border); border-radius:4px; padding:1px 5px;
    color:var(--text); font-family:monospace; }
  #hud .mode { color:var(--accent); font-weight:700; }

  /* Tool dock (right-side controls) */
  #dock { position:fixed; bottom:12px; right:12px; z-index:41; display:flex; gap:8px; align-items:center;
    pointer-events:auto; background:rgba(28,32,50,0.85); border:1px solid var(--border); border-radius:10px;
    padding:8px 12px; backdrop-filter:blur(8px); font-size:12px; color:var(--text-dim); }
  #dock button { background:var(--panel); color:var(--text); border:1px solid var(--border);
    padding:6px 10px; border-radius:6px; cursor:pointer; font:inherit; font-size:12px; }
  #dock button:hover { background:var(--panel-2); border-color:var(--border-2); }
  #dock button.active { background:rgba(255,184,77,0.18); border-color:var(--accent-2); color:var(--accent-2); }
  #dock input[type=range] { accent-color: var(--accent); width:90px; }
  #dock label { color:var(--text-mute); }

  /* Screenshot-test mode: strip chrome and make DOM-node overlap a pixel color. */
  html.screenshot-mode body { background:#fff; }
  html.screenshot-mode canvas,
  html.screenshot-mode #hud,
  html.screenshot-mode #dock,
  html.screenshot-mode #toast,
  html.screenshot-mode #jump-layer,
  html.screenshot-mode .modal { display:none !important; }
  html.screenshot-mode #ui-layer { pointer-events:none; }
  html.screenshot-mode .node,
  html.screenshot-mode .node:hover,
  html.screenshot-mode .node.selected,
  html.screenshot-mode .node.connecting,
  html.screenshot-mode .node.collapsed,
  html.screenshot-mode .node.is-container {
    width:160px; height:72px; min-width:160px; max-width:160px;
    padding:0; border:0; border-radius:0; box-shadow:none; backdrop-filter:none;
    background:rgba(0,0,0,0.5); opacity:1 !important; overflow:hidden;
    transition:none; cursor:default;
  }
  html.screenshot-mode .node .title,
  html.screenshot-mode .node .body,
  html.screenshot-mode .node.is-container .title {
    color:transparent; text-shadow:none;
  }
  html.screenshot-mode .node.has-children .title::before,
  html.screenshot-mode .node.collapsed .title::after { content:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui-layer"></div>

<div id="palette" class="modal hidden">
  <input id="palette-input" placeholder="Type a command…" autocomplete="off" spellcheck="false">
  <div id="palette-list" class="list"></div>
</div>

<div id="editor" class="modal hidden">
  <input id="editor-search" placeholder="Search…  (↑/↓ select  ⌥1–9 quick-edit  Enter focus row)" autocomplete="off" spellcheck="false">
  <div id="editor-list" class="list"></div>
  <div class="actions">
    <button id="editor-add">+ Add</button>
    <button id="editor-del">− Delete selected</button>
    <span style="flex:1; color:var(--text-mute); font-size:11px;">Edits save live</span>
    <button id="editor-close" class="primary">Done</button>
  </div>
</div>

<div id="toast"></div>
<div id="jump-layer"></div>

<div id="hud">
  <div>Mode: <span class="mode" id="hud-mode">NORMAL</span></div>
  <kbd>A</kbd> Add &nbsp;<kbd>⇧A</kbd> Sibling &nbsp;<kbd>X</kbd> Delete &nbsp;<kbd>E</kbd> Edit &nbsp;<kbd>C</kbd> Connect &nbsp;<kbd>Space</kbd> Collapse<br>
  <kbd>F</kbd> Fit view &nbsp;<kbd>⇧F</kbd> Fit parent &nbsp;<kbd>J</kbd> Jump (nodes + labels) &nbsp;<kbd>1-3</kbd> Layers &nbsp;<kbd>Arrows</kbd> Pan &nbsp;<kbd>+/-</kbd> Zoom &nbsp;<kbd>L</kbd> Layout (<span id="hud-layout">radial</span>) &nbsp;<kbd>⇧L</kbd> Cycle &nbsp;<kbd>P</kbd> Palette<br>
  <kbd>Alt+Z</kbd> Back &nbsp;Click selected title = rename &nbsp;In connect: just start typing or <kbd>/</kbd>
</div>

<div id="dock">
  <button id="btn-demo">▶ Demo</button>
  <button id="btn-stop" style="display:none;">■ Stop</button>
  <label>Speed</label>
  <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1">
  <span id="speed-val">1.0×</span>
  <button id="btn-edit-palette">⚙ Palette</button>
  <button id="btn-toast">Toast: off</button>
  <button id="btn-reset">↺ Reset</button>
</div>

<script>
/* ============================================================
   1. SCHEDULER
   ============================================================ */
let rafId = null;
function scheduleRender() {
  if (rafId !== null) return;
  rafId = requestAnimationFrame(() => { rafId = null; render(); });
}

/* ============================================================
   2. CONTEXT
   ============================================================ */
const Context = {
  selectedId: null,
  mode: 'normal',           // normal | connecting | palette
  camera: { x: 0, y: 0, zoom: 1, layerZ: 0 },
  history: [],
  lastVisited: null,
  connectSource: null,
  drag: { active: false, id: null, sx: 0, sy: 0, moved: false },
  mouse: { x: innerWidth/2, y: innerHeight/2 },
  lastEvents: [],
  demoSpeed: 1,
  layoutMode: 'radial', // radial | vertical | horizontal | grid
};
const LAYOUTS = ['radial','vertical','horizontal','grid'];

/* ============================================================
   3. TOAST (coalesces streams, suppresses noise)
   ============================================================ */
const activeStreams = new Set();
const TOAST_SUPPRESS = new Set(['compAdded','entityRemoved','worldCleared']);
function logToast(name, data) {
  if (typeof toastEnabled !== 'undefined' && !toastEnabled) return;
  if (TOAST_SUPPRESS.has(name)) return;
  if (name === 'camera-pan' || name === 'node-drag') {
    if (activeStreams.has(name)) return;
    activeStreams.add(name);
    name += ' (start)';
  }
  if (name === 'camera-pan-end' || name === 'node-drag-end') {
    activeStreams.delete(name.replace('-end',''));
  }
  const payload = data ? JSON.stringify(data).slice(0, 80) : '';
  const entry = `<span class="t">${performance.now().toFixed(0)}</span><span class="n">${name}</span> <span class="m">${Context.mode}${payload ? ' • ' + payload : ''}</span>`;
  Context.lastEvents.unshift(entry);
  if (Context.lastEvents.length > 7) Context.lastEvents.pop();
  document.getElementById('toast').innerHTML = Context.lastEvents.map(h => `<div class="toast-item">${h}</div>`).join('');
}

/* ============================================================
   4. EVENT BUS
   ============================================================ */
class EventBus {
  constructor() { this.l = {}; }
  on(e, cb) { (this.l[e] = this.l[e] || []).push(cb); return () => this.off(e, cb); }
  off(e, cb) { if (this.l[e]) this.l[e] = this.l[e].filter(f => f !== cb); }
  emit(e, d) {
    (this.l[e] || []).forEach(cb => cb(d || {}));
    logToast(e, d);
    scheduleRender();
  }
}
const bus = new EventBus();

/* ============================================================
   5. ECS
   ============================================================ */
const world = {
  e: new Map(), c: {}, id: 1,
  create() { const i = this.id++; this.e.set(i, new Set()); return i; },
  add(i, t, d) { (this.c[t] = this.c[t] || new Map()).set(i, d); this.e.get(i).add(t); bus.emit('compAdded', { i, t }); },
  get(i, t) { return this.c[t]?.get(i); },
  has(i, t) { return this.e.get(i)?.has(t); },
  remove(i) { this.e.get(i)?.forEach(t => this.c[t]?.delete(i)); this.e.delete(i); bus.emit('entityRemoved', { i }); },
  q(ts) { const r = []; for (const [i, cs] of this.e) if (ts.every(t => cs.has(t))) r.push(i); return r; },
  clear() {
    for (const [i] of this.e) {
      const n = this.c.Node?.get(i); if (n?.domEl) n.domEl.remove();
    }
    this.e.clear(); this.c = {}; this.id = 1;
    bus.emit('worldCleared');
  }
};

/* ============================================================
   6. CANVAS & PROJECTION
   ============================================================ */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const uiLayer = document.getElementById('ui-layer');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.addEventListener('resize', () => { resize(); scheduleRender(); });
resize();

function persp(z) { return 1000 / (1000 - z); }
function worldToScreen(x, y, z) {
  const c = Context.camera, s = c.zoom * persp(z);
  return { x: (x - c.x) * s + canvas.width / 2, y: (y - c.y) * s + canvas.height / 2, scale: s };
}
function screenToWorld(sx, sy, z = Context.camera.layerZ) {
  const c = Context.camera, s = c.zoom * persp(z);
  return { x: (sx - canvas.width / 2) / s + c.x, y: (sy - canvas.height / 2) / s + c.y, z };
}

/* ============================================================
   7. SHORTCUTS
   ============================================================ */
const SHORTCUTS = [
  { event: 'keydown', key: 'a', mode: 'normal', repeat: false, emit: 'cmd-add-node' },
  { event: 'keydown', key: 'A', modifiers: ['shift'], mode: 'normal', repeat: false, emit: 'cmd-add-sibling' },
  { event: 'keydown', key: 'x', mode: 'normal', repeat: false, emit: 'cmd-delete' },
  { event: 'keydown', key: 'Delete', mode: 'normal', repeat: false, emit: 'cmd-delete' },
  { event: 'keydown', key: 'e', mode: 'normal', repeat: false, emit: 'cmd-edit' },
  { event: 'keydown', key: 'c', mode: 'normal', repeat: false, emit: 'cmd-connect-start' },
  { event: 'keydown', key: ' ', mode: 'normal', repeat: false, emit: 'cmd-collapse' },
  { event: 'keydown', key: 'l', mode: 'normal', repeat: false, emit: 'cmd-layout' },
  { event: 'keydown', key: 'L', modifiers: ['shift'], mode: 'normal', repeat: false, emit: 'cmd-layout-cycle' },
  { event: 'keydown', key: 'f', mode: 'normal', repeat: false, emit: 'cmd-fit-view' },
  { event: 'keydown', key: 'F', modifiers: ['shift'], mode: 'normal', repeat: false, emit: 'cmd-fit-parent' },
  { event: 'keydown', key: 'j', mode: 'normal', repeat: false, emit: 'cmd-jump' },
  { event: 'keydown', key: '1', mode: 'normal', repeat: false, emit: 'cmd-layer', payload: { z: 0 } },
  { event: 'keydown', key: '2', mode: 'normal', repeat: false, emit: 'cmd-layer', payload: { z: -300 } },
  { event: 'keydown', key: '3', mode: 'normal', repeat: false, emit: 'cmd-layer', payload: { z: -600 } },
  { event: 'keydown', key: 'Escape', mode: 'normal', emit: 'cmd-deselect' },
  { event: 'keydown', key: 'z', modifiers: ['alt'], mode: 'normal', repeat: false, emit: 'cmd-history-back' },
  { event: 'keydown', key: 'p', mode: 'normal', repeat: false, emit: 'cmd-palette-open' },
  { event: 'keydown', key: 'Escape', mode: 'connecting', emit: 'cmd-connect-cancel' },
  { event: 'keydown', key: '/', mode: 'connecting', emit: 'cmd-connect-pick' },
  { event: 'keydown', key: 'Tab', mode: 'connecting', emit: 'cmd-connect-pick' },
  { event: 'keydown', key: 'Escape', mode: 'palette', emit: 'cmd-palette-close' },

  { event: 'keydown', key: 'ArrowLeft', emit: 'pan-left' },
  { event: 'keydown', key: 'ArrowRight', emit: 'pan-right' },
  { event: 'keydown', key: 'ArrowUp', emit: 'pan-up' },
  { event: 'keydown', key: 'ArrowDown', emit: 'pan-down' },
  { event: 'keydown', key: '+', emit: 'zoom-in' },
  { event: 'keydown', key: '=', emit: 'zoom-in' },
  { event: 'keydown', key: '-', emit: 'zoom-out' },

  { event: 'wheel', deltaY: '<0', emit: 'zoom-in' },
  { event: 'wheel', deltaY: '>0', emit: 'zoom-out' },

  { event: 'dblclick', target: 'node', emit: 'cmd-edit' },
];

class DomainEventRouter {
  constructor(map) { this.map = map; }
  match(raw) {
    for (const sc of this.map) {
      if (sc.event && sc.event !== raw.type) continue;
      if (sc.key && sc.key !== raw.key) continue;
      if (sc.target && sc.target !== raw.target) continue;
      if (sc.mode && sc.mode !== Context.mode) continue;
      if (sc.repeat === false && raw.repeat) continue;
      if (sc.deltaY) {
        if (sc.deltaY === '>0' && !(raw.deltaY > 0)) continue;
        if (sc.deltaY === '<0' && !(raw.deltaY < 0)) continue;
      }
      if (sc.modifiers) {
        let ok = true;
        for (const m of sc.modifiers) {
          if (m === 'ctrl' && !raw.ctrl) ok = false;
          if (m === 'shift' && !raw.shift) ok = false;
          if (m === 'alt' && !raw.alt) ok = false;
          if (m === 'meta' && !raw.meta) ok = false;
        }
        if (!ok) continue;
      }
      bus.emit(sc.emit, { ...(sc.payload || {}), eid: raw.eid });
      return true;
    }
    return false;
  }
}
const router = new DomainEventRouter(SHORTCUTS);

/* ============================================================
   8. INPUT CONTROLLER
   ============================================================ */
class InputController {
  constructor() {
    this.stream = null;
    window.addEventListener('keydown', e => this._key(e));
    window.addEventListener('wheel', e => this._wheel(e), { passive: true });
    window.addEventListener('mousedown', e => this._md(e));
    window.addEventListener('mousemove', e => this._mm(e));
    window.addEventListener('mouseup', e => this._mu(e));
    window.addEventListener('dblclick', e => this._dbl(e));
  }
  _tgt(e) {
    if (e.target.closest('.node')) return 'node';
    if (e.target.closest('.modal')) return 'modal';
    if (e.target.closest('#dock')) return 'dock';
    return 'background';
  }
  _key(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    // Jump-mode swallows everything: buffer chars, match hint, select.
    if (Context.mode === 'jump') { handleJumpKey(e); return; }
    // In connect mode, any printable char opens the picker prefilled with that char
    // — makes keyboard-only "connect to X" discoverable.
    if (Context.mode === 'connecting' && e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      bus.emit('cmd-connect-pick');
      const ch = e.key;
      setTimeout(() => { paletteInput.value = ch; paletteSel = 0; renderPalette(ch); }, 0);
      return;
    }

  if (!root) return;

  world.q(['Node']).forEach(id => { const n = world.get(id, 'Node'); n.domEl?.classList.add('smooth'); });

        else lay(cid, x + cross, y + center, depth + 1);

      const cw = 200, ch = 140;

  if (world.has(target, 'Edge')) {

    if (!t1 || !t2) return;
    bbox.minX = Math.min(t1.x, t2.x) - 80; bbox.maxX = Math.max(t1.x, t2.x) + 80;
    bbox.minY = Math.min(t1.y, t2.y) - 60; bbox.maxY = Math.max(t1.y, t2.y) + 60;

    };
    collect(target);
    for (const id of ids) {
      const t = world.get(id, 'Transform'), n = world.get(id, 'Node');
      if (!t || !n) continue;
      const w = (n.domEl.offsetWidth || 200) / 2;
      const h = (n.domEl.offsetHeight || 70) / 2;
      bbox.minX = Math.min(bbox.minX, t.x - w);
      bbox.maxX = Math.max(bbox.maxX, t.x + w);
      bbox.minY = Math.min(bbox.minY, t.y - h);
      bbox.maxY = Math.max(bbox.maxY, t.y + h);
    }
  }
  if (!isFinite(bbox.minX)) return;
  const padding = 120;
  const w = (bbox.maxX - bbox.minX) + padding * 2;
  const h = (bbox.maxY - bbox.minY) + padding * 2;
  Context.camera.zoom = Math.min(canvas.width / w, canvas.height / h, 2.0);
  Context.camera.x = (bbox.minX + bbox.maxX) / 2;
  Context.camera.y = (bbox.minY + bbox.maxY) / 2;
  scheduleRender();
}
bus.on('cmd-fit-view', () => fitView(Context.selectedId));
bus.on('cmd-fit-parent', () => {
  const sel = Context.selectedId;
  if (sel == null) { fitView(null); return; }
  if (world.has(sel, 'Edge')) { fitView(sel); return; }
  const n = world.get(sel, 'Node');
  fitView(n && n.parentId != null ? n.parentId : sel);
});

/* ============================================================
   Label-jump nav: press J → hint chips → type to select.
   Hints derived from word-first-letters; collisions resolved by digit suffix.
   ============================================================ */
let jumpHints = new Map();        // hint string → eid
let jumpBuffer = '';
function generateHint(title, used) {
  const t = (title || 'node').trim();
  const words = t.split(/[\s\-_./]+/).filter(Boolean);
  let base = words.length > 1
    ? words.map(w => w[0].toLowerCase()).slice(0, 4).join('')
    : (words[0] || 'n').slice(0, 2).toLowerCase();
  if (!base) base = 'n';
  let h = base, i = 1;
  while (used.has(h)) h = base + i++;
  used.add(h);
  return h;
}
function buildJumpHints() {
  jumpHints = new Map();
  const used = new Set();
  for (const id of world.q(['Node'])) {
    if (!isVisible(id)) continue;
    const n = world.get(id, 'Node');
    jumpHints.set(generateHint(n.title, used), id);
  }
  // Edges with non-empty labels and visible endpoints (skip container-implied parent→child).
  for (const id of world.q(['Edge'])) {
    const ed = world.get(id, 'Edge');
    if (!ed.label) continue;
    if (!isVisible(ed.from) || !isVisible(ed.to)) continue;
    const src = world.get(ed.from, 'Node');
    if (src && !src.collapsed && src.children.includes(ed.to)) continue;
    jumpHints.set(generateHint(ed.label, used), id);
  }
}
function hintPosition(eid) {
  if (world.has(eid, 'Node')) {
    const n = world.get(eid, 'Node');
    const r = n.domEl.getBoundingClientRect();
    return { x: r.left - 4, y: r.top + r.height/2 };
  }
  if (world.has(eid, 'Edge')) {
    const ed = world.get(eid, 'Edge');
    const t1 = world.get(ed.from, 'Transform'), t2 = world.get(ed.to, 'Transform');
    if (!t1 || !t2) return null;
    const s1 = worldToScreen(t1.x, t1.y, t1.z), s2 = worldToScreen(t2.x, t2.y, t2.z);
    return { x: (s1.x + s2.x) / 2, y: (s1.y + s2.y) / 2 - 12 };
  }
  return null;
}
function renderJumpHints() {
  const jl = document.getElementById('jump-layer');
  if (Context.mode !== 'jump') { jl.innerHTML = ''; return; }
  const html = [];
  for (const [hint, eid] of jumpHints) {
    if (jumpBuffer && !hint.startsWith(jumpBuffer)) continue;
    const pos = hintPosition(eid); if (!pos) continue;
    const typed = hint.slice(0, jumpBuffer.length);
    const rest = hint.slice(jumpBuffer.length);
    const cls = (jumpBuffer && hint.startsWith(jumpBuffer) ? 'jump-hint match' : 'jump-hint')
              + (world.has(eid, 'Edge') ? ' edge' : '');
    html.push(`<div class="${cls}" style="left:${pos.x}px;top:${pos.y}px;"><span class="typed">${typed}</span>${rest}</div>`);
  }
  jl.innerHTML = html.join('');
}
bus.on('cmd-jump', () => {
  if (!world.q(['Node']).length) return;
  Context.mode = 'jump';
  jumpBuffer = '';
  buildJumpHints();
  renderJumpHints();
});
bus.on('cmd-jump-cancel', () => {
  Context.mode = 'normal'; jumpBuffer = ''; jumpHints = new Map();
  renderJumpHints();
  scheduleRender();
});
function handleJumpKey(e) {
  if (e.key === 'Escape') { e.preventDefault(); bus.emit('cmd-jump-cancel'); return; }
  if (e.key === 'Backspace') { e.preventDefault(); jumpBuffer = jumpBuffer.slice(0, -1); renderJumpHints(); return; }
  if (e.key.length !== 1) return;
  e.preventDefault();
  const next = jumpBuffer + e.key.toLowerCase();
  if (jumpHints.has(next)) {
    const eid = jumpHints.get(next);
    bus.emit('node-select', { eid });
    bus.emit('cmd-jump-cancel');
    bus.emit('cmd-fit-view');
    return;
  }
  // Any hint still possible with this prefix?
  const stillPossible = [...jumpHints.keys()].some(h => h.startsWith(next));
  jumpBuffer = stillPossible ? next : '';
  renderJumpHints();
}

/* ============================================================
   11. FACTORIES
   ============================================================ */
function nextChildName(parentId) {
  if (parentId == null) return 'Root';
  const p = world.get(parentId, 'Node'); if (!p) return 'Node';
  const used = new Set(p.children.map(c => (world.get(c, 'Node')?.title || '').trim()));
  for (let c = 65; c <= 90; c++) { const name = String.fromCharCode(c); if (!used.has(name)) return name; }
  for (let i = 1; ; i++) { const name = 'N' + i; if (!used.has(name)) return name; }
}
function createNode(x, y, z, title, body = '', parentId = null) {
  const eid = world.create();
  const el = document.createElement('div');
  el.className = 'node'; el.dataset.eid = eid;
  el.innerHTML = `<div class="title">${title}</div><div class="body">${body}</div>`;
  uiLayer.appendChild(el);
  world.add(eid, 'Transform', { x, y, z });
  world.add(eid, 'Node', { title, body, parentId, domEl: el, children: [], collapsed: false });
  if (parentId) { const p = world.get(parentId, 'Node'); if (p) p.children.push(eid); }
  return eid;
}
function createEdge(from, to, label = '') {
  const eid = world.create();
  world.add(eid, 'Edge', { from, to, label });
  return eid;
}
function isVisible(id) {
  const n = world.get(id, 'Node'); if (!n) return true;
  if (n.parentId) { const p = world.get(n.parentId, 'Node'); if (p && p.collapsed) return false; return isVisible(n.parentId); }
  return true;
}
function deleteTree(id) {
  const n = world.get(id, 'Node');
  if (n) { [...n.children].forEach(deleteTree); n.domEl.remove(); }
  world.q(['Edge']).forEach(eid2 => { const ed = world.get(eid2, 'Edge'); if (ed.from === id || ed.to === id) world.remove(eid2); });
  world.remove(id);
}

/* ============================================================
   12. RENDER (grid → containers → edges → ghost → nodes)
   ============================================================ */
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid (two-tone for depth)
  const c = Context.camera;
  ctx.lineWidth = 1;
  const gs = 60 * c.zoom;
  const ox = (canvas.width / 2 - c.x * c.zoom) % gs;
  const oy = (canvas.height / 2 - c.y * c.zoom) % gs;
  ctx.strokeStyle = '#252840';
  ctx.beginPath();
  for (let x = ox; x < canvas.width; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
  for (let y = oy; y < canvas.height; y += gs) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
  ctx.stroke();

  // 3D nested containers: draw a translucent rounded box around each parent's subtree.
  // Walk from deepest -> shallowest so outer boxes sit behind inner ones.
  const nodes = world.q(['Transform','Node']);
  const depthMap = new Map();
  const depthOf = (id) => {
    if (depthMap.has(id)) return depthMap.get(id);
    const n = world.get(id, 'Node');
    const d = n.parentId ? depthOf(n.parentId) + 1 : 0;
    depthMap.set(id, d); return d;
  };
  nodes.forEach(depthOf);
  const parents = nodes.filter(id => {
    const n = world.get(id, 'Node');
    return n.children.length && !n.collapsed && isVisible(id);
  }).sort((a, b) => depthOf(a) - depthOf(b));

  // Bounding box of a parent's *descendants* only (excludes the parent itself, since
  // an expanded parent gets repositioned to a header bar above its subtree).
  const HEADER_H = 38;
  const descendantsBounds = (id) => {
    const result = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
    const visit = (i) => {
      const t = world.get(i, 'Transform'), n = world.get(i, 'Node');
      if (!t || !n) return;
      const el = n.domEl;
      const w = (el.offsetWidth || 180) / 2;
      const h = (el.offsetHeight || 70) / 2;
      const s = worldToScreen(t.x, t.y, t.z);
      result.minX = Math.min(result.minX, s.x - w * s.scale);
      result.maxX = Math.max(result.maxX, s.x + w * s.scale);
      result.minY = Math.min(result.minY, s.y - h * s.scale);
      result.maxY = Math.max(result.maxY, s.y + h * s.scale);
      if (!n.collapsed) n.children.forEach(visit);
    };
    const root = world.get(id, 'Node');
    if (root && !root.collapsed) root.children.forEach(visit);
    return result;
  };

  const bboxByParent = new Map();
  for (const pid of parents) bboxByParent.set(pid, descendantsBounds(pid));

  for (const pid of parents) {
    const b = bboxByParent.get(pid);
    if (!isFinite(b.minX)) continue;
    const pad = 22;
    const d = depthOf(pid);
    const x = b.minX - pad;
    const y = b.minY - pad - HEADER_H;
    const w = (b.maxX - b.minX) + pad*2;
    const h = (b.maxY - b.minY) + pad*2 + HEADER_H;
    const r = 14;
    const hue = 220 + (d * 18) % 60;
    ctx.fillStyle = `hsla(${hue}, 35%, 22%, 0.55)`;
    ctx.strokeStyle = `hsla(${hue}, 45%, 55%, 0.4)`;
    ctx.lineWidth = 1.2;
    roundRect(x, y, w, h, r); ctx.fill(); ctx.stroke();
  }

  // Edges
  ctx.lineWidth = 2;
  for (const eid of world.q(['Edge'])) {
    const ed = world.get(eid, 'Edge');
    if (!isVisible(ed.from) || !isVisible(ed.to)) continue;
    // Skip parent→child arrows when the parent is an expanded container —
    // containment carries the relationship visually.
    const srcN = world.get(ed.from, 'Node');
    if (srcN && !srcN.collapsed && srcN.children.includes(ed.to)) continue;
    const t1 = world.get(ed.from, 'Transform'), t2 = world.get(ed.to, 'Transform');
    if (!t1 || !t2) continue;
    const s1 = worldToScreen(t1.x, t1.y, t1.z), s2 = worldToScreen(t2.x, t2.y, t2.z);
    const sel = Context.selectedId === eid;
    ctx.strokeStyle = sel ? '#ffb84d' : '#5bd2ff';
    ctx.lineWidth = sel ? 3 : 2;
    ctx.globalAlpha = Math.min(1, Math.min(s1.scale, s2.scale));
    ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
    const ang = Math.atan2(s2.y - s1.y, s2.x - s1.x);
    const ah = 9 * Math.min(s1.scale, s2.scale);
    ctx.fillStyle = sel ? '#ffb84d' : '#5bd2ff';
    ctx.beginPath();
    ctx.moveTo(s2.x, s2.y);
    ctx.lineTo(s2.x - ah * Math.cos(ang - 0.4), s2.y - ah * Math.sin(ang - 0.4));
    ctx.lineTo(s2.x - ah * Math.cos(ang + 0.4), s2.y - ah * Math.sin(ang + 0.4));
    ctx.fill();
    if (ed.label) {
      ctx.fillStyle = '#8590b5'; ctx.font = '12px sans-serif';
      ctx.fillText(ed.label, (s1.x + s2.x) / 2, (s1.y + s2.y) / 2 - 6);
    }
    ctx.globalAlpha = 1;
  }

  // Ghost connect line (drawn whenever a source is staged, including during picker)
  if (Context.connectSource) {
    const t = world.get(Context.connectSource, 'Transform');
    if (t) {
      const s = worldToScreen(t.x, t.y, t.z);
      ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(Context.mouse.x, Context.mouse.y);
      ctx.strokeStyle = '#ffb84d'; ctx.setLineDash([6, 5]); ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = '#ffb84d'; ctx.font = '12px sans-serif';
      ctx.fillText('connect (click empty to create)', (s.x + Context.mouse.x) / 2 + 10, (s.y + Context.mouse.y) / 2 - 8);
    }
  }

  // DOM nodes
  nodes.sort((a, b) => world.get(a, 'Transform').z - world.get(b, 'Transform').z);
  for (const eid of nodes) {
    const t = world.get(eid, 'Transform'), n = world.get(eid, 'Node');
    const s = worldToScreen(t.x, t.y, t.z);
    const vis = isVisible(eid);
    n.domEl.style.display = vis ? 'block' : 'none'; if (!vis) continue;
    const b = bboxByParent.get(eid);
    const isContainer = !!(b && isFinite(b.minX));
    if (isContainer) {
      const cx = (b.minX + b.maxX) / 2;
      const cy = b.minY - 22 - HEADER_H/2;
      n.domEl.style.transform = `translate(${cx}px,${cy}px) translate(-50%,-50%)`;
      n.domEl.style.opacity = 1;
      n.domEl.style.zIndex = Math.floor(t.z + 1000) + 2;
    } else {
      n.domEl.style.transform = `translate(${s.x}px,${s.y}px) scale(${s.scale}) translate(-50%,-50%)`;
      n.domEl.style.opacity = Math.max(0.4, Math.min(1, s.scale));
      n.domEl.style.zIndex = Math.floor(t.z + 1000);
    }
    n.domEl.classList.toggle('is-container', isContainer);
    n.domEl.classList.toggle('selected', Context.selectedId === eid);
    n.domEl.classList.toggle('connecting', Context.connectSource === eid);
    n.domEl.classList.toggle('collapsed', n.collapsed);
    n.domEl.classList.toggle('has-children', n.children.length > 0);
  }

  document.getElementById('hud-mode').textContent =
    Context.mode === 'normal' ? 'NORMAL' :
    Context.mode === 'connecting' ? 'CONNECTING' :
    Context.mode === 'jump' ? 'JUMP' + (jumpBuffer ? ` "${jumpBuffer}"` : '') : 'PALETTE';
  const hl = document.getElementById('hud-layout'); if (hl) hl.textContent = Context.layoutMode;
  if (Context.mode === 'jump') renderJumpHints();
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

const queryParams = new URLSearchParams(location.search);

function buildJMM() {
  const jvm = createNode(0, -260, 0, 'JVM Runtime', '');
  const heap = createNode(-340, 40, 0, 'Heap', 'Object storage', jvm);
  const stack = createNode(340, 40, 0, 'JVM Stack', 'Per-thread', jvm);
  const meta = createNode(0, 0, 0, 'Metaspace', 'Class metadata', jvm);
  const eden = createNode(-420, 220, -300, 'Eden', 'New objects', heap);
  const surv = createNode(-190, 220, -300, 'Survivor', 'S0 / S1', heap);
  const old  = createNode(40, 220, -300, 'Old Gen', 'Long-lived', heap);
  const t1   = createNode(260, 220, -300, 'Thread-1', 'Local vars', stack);
  const t2   = createNode(500, 220, -300, 'Thread-2', 'Local vars', stack);
  const obj  = createNode(-520, 420, -600, 'Object', 'In Eden', eden);
  const ref1 = createNode(340, 420, -600, 'ref', 'Local variable', t1);
  const ref2 = createNode(620, 420, -600, 'ref', 'Local variable', t2);
  createEdge(jvm,heap,'manages'); createEdge(jvm,stack,'manages'); createEdge(jvm,meta,'manages');
  createEdge(heap,eden,'contains'); createEdge(heap,surv,'contains'); createEdge(heap,old,'contains');
  createEdge(stack,t1,'frame'); createEdge(stack,t2,'frame');
  createEdge(eden,obj,'allocates');
  createEdge(t1,ref1,'holds'); createEdge(t2,ref2,'holds');
  createEdge(ref1,obj,'points to'); createEdge(ref2,obj,'points to');
  Context.selectedId = jvm;
}

const screenshotFixtures = {
  separated: {
    camera: { x: 0, y: 0, zoom: 1, layerZ: 0 },
    nodes: [
      { at: [-140, 0, 0], title: 'A' },
      { at: [140, 0, 0], title: 'B' },
    ],
  },
  overlapping: {
    camera: { x: 0, y: 0, zoom: 1, layerZ: 0 },
    nodes: [
      { at: [-40, 0, 0], title: 'A' },
      { at: [40, 0, 0], title: 'B' },
    ],
  },
};

const defaultScreenshotCamera = { x: 0, y: 0, zoom: 1, layerZ: 0 };

function resetGraphState(camera = defaultScreenshotCamera) {
  stopDemo();
  world.clear();
  Context.selectedId = null;
  Context.mode = 'normal';
  Context.camera = { ...camera };
  Context.history = [];
  Context.lastVisited = null;
  Context.connectSource = null;
  Context.drag = { active: false, id: null, sx: 0, sy: 0, moved: false };
}

function buildScreenshotFixture(name) {
  const fixture = screenshotFixtures[name];
  if (!fixture) throw new Error(`Unknown screenshot fixture: ${name}`);
  resetGraphState(fixture.camera);
  const ids = fixture.nodes.map(node => createNode(node.at[0], node.at[1], node.at[2], node.title, node.body || '', node.parentId || null));
  for (const edge of fixture.edges || []) createEdge(ids[edge.from], ids[edge.to], edge.label || '');
  Context.selectedId = ids[0] || null;
  document.body.dataset.fixture = name;
  document.body.dataset.fixtureReady = '1';
}

function selectRef(refs, key) {
  bus.emit('node-select', { eid: refs[key] });
}

function addScriptNode(refs, key, data) {
  bus.emit('cmd-add-node', data);
  refs[key] = Context.selectedId;
}

const screenshotScripts = {
  demoMemory: [
    {
      checkpoint: 'root-added',
      fn: refs => addScriptNode(refs, 'jvm', { at: [0, -260, 0], title: 'JVM Runtime', parent: null }),
    },
    {
      checkpoint: 'top-level-expanded',
      fn: refs => {
        selectRef(refs, 'jvm');
        addScriptNode(refs, 'heap', { at: [-340, 40, 0], title: 'Heap', body: 'Object storage' });
        selectRef(refs, 'jvm');
        addScriptNode(refs, 'stack', { at: [340, 40, 0], title: 'JVM Stack', body: 'Per-thread' });
        selectRef(refs, 'jvm');
        addScriptNode(refs, 'meta', { at: [0, 0, 0], title: 'Metaspace', body: 'Class metadata' });
      },
    },
    {
      checkpoint: 'heap-children-just-added',
      fn: refs => {
        bus.emit('cmd-layer', { z: -300 });
        selectRef(refs, 'heap');
        addScriptNode(refs, 'eden', { at: [-420, 220, -300], title: 'Eden', body: 'New objects' });
        selectRef(refs, 'heap');
        addScriptNode(refs, 'surv', { at: [-190, 220, -300], title: 'Survivor', body: 'S0 / S1' });
        selectRef(refs, 'heap');
        addScriptNode(refs, 'old', { at: [40, 220, -300], title: 'Old Gen', body: 'Long-lived' });
      },
    },
    {
      checkpoint: 'stack-children-just-added',
      fn: refs => {
        selectRef(refs, 'stack');
        addScriptNode(refs, 't1', { at: [260, 220, -300], title: 'Thread-1', body: 'Local vars' });
        selectRef(refs, 'stack');
        addScriptNode(refs, 't2', { at: [500, 220, -300], title: 'Thread-2', body: 'Local vars' });
      },
    },
    {
      checkpoint: 'deep-object-just-added',
      fn: refs => {
        bus.emit('cmd-layer', { z: -600 });
        selectRef(refs, 'eden');
        addScriptNode(refs, 'obj', { at: [-520, 420, -600], title: 'Object', body: 'In Eden' });
      },
    },
    {
      checkpoint: 'deep-ref-just-added',
      fn: refs => {
        selectRef(refs, 't1');
        bus.emit('cmd-connect-start');
        addScriptNode(refs, 'ref1', { at: [340, 420, -600], title: 'ref', body: 'Local variable', connectFrom: refs.t1 });
      },
    },
    {
      checkpoint: 'heap-collapsed',
      fn: refs => {
        selectRef(refs, 'heap');
        bus.emit('cmd-collapse');
      },
    },
    {
      checkpoint: 'heap-expanded-again',
      fn: refs => {
        selectRef(refs, 'heap');
        bus.emit('cmd-collapse');
      },
    },
  ],
};

function visibleNodeCount() {
  return world.q(['Node']).filter(isVisible).length;
}

function runScreenshotScript(name, checkpoint) {
  const script = screenshotScripts[name];
  if (!script) throw new Error(`Unknown screenshot script: ${name}`);
  resetGraphState(defaultScreenshotCamera);
  const refs = {};
  let reached = null;

  for (const step of script) {
    step.fn(refs);
    reached = step.checkpoint;
    if (!checkpoint || reached === checkpoint) break;
  }

  if (checkpoint && reached !== checkpoint) throw new Error(`Unknown checkpoint "${checkpoint}" for screenshot script "${name}"`);
  render();
  document.body.dataset.fixture = '';
  document.body.dataset.script = name;
  document.body.dataset.checkpoint = reached || '';
  document.body.dataset.visibleNodeCount = String(visibleNodeCount());
  document.body.dataset.fixtureReady = '1';
  return { script: name, checkpoint: reached, refs: { ...refs }, visibleNodeCount: visibleNodeCount() };
}

window.__ecsGraphTest = {
  buildScreenshotFixture,
  runScreenshotScript,
  resetGraphState,
  worldToScreen,
  renderNow: render,
  fixtures: Object.keys(screenshotFixtures),
  scripts: Object.fromEntries(Object.entries(screenshotScripts).map(([name, steps]) => [name, steps.map(step => step.checkpoint)])),
};

const screenshotFixture = queryParams.get('fixture');
const screenshotScript = queryParams.get('script');
if (screenshotFixture) buildScreenshotFixture(screenshotFixture);
else if (screenshotScript) runScreenshotScript(screenshotScript, queryParams.get('checkpoint'));
else buildJMM();
scheduleRender();
</script>
</body>
