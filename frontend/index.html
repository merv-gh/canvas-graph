<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Canvas Graph is a keyboard-first visual editor for structured systems, flows, and ideas.">
  <meta name="theme-color" content="#f8f8f8">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Canvas Graph — Visual Graph Editor">
  <meta property="og:description" content="A keyboard-first visual editor for structured systems, flows, and ideas.">
  <meta property="og:url" content="https://merv-gh.github.io/canvas-graph/">
  <link rel="canonical" href="https://merv-gh.github.io/canvas-graph/">
  <title>Canvas Graph — Visual Graph Editor</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="app.ts"></script>
</head>
<body>
  <div id="app"></div>

  <template id="tpl-shell">
    <section class="shell">
      <header class="top" data-place="top"></header>
      <main class="stage" data-place="stage"></main>
      <div class="left" data-place="left"></div>
      <div class="modal-slot" data-place="modal"></div>
    </section>
  </template>

  <template id="tpl-toolbar">
    <nav class="toolbar" aria-label="App commands">
      <div class="toolbar-start" data-slot="start"></div>
      <span class="toolbar-spacer"></span>
      <div class="toolbar-end" data-slot="end"></div>
    </nav>
  </template>

  <template id="tpl-log">
    <section>
      <h2 class="panel-title">Event log</h2>
      <div class="log" data-slot="rows"></div>
    </section>
  </template>

  <template id="tpl-log-row">
    <div class="log-row" data-text="name"></div>
  </template>

  <template id="tpl-nodes">
    <div class="nodes">
      <svg class="edges" data-slot="edges" overflow="visible" aria-hidden="true">
        <defs>
          <!-- Directional arrowhead shared by every edge. `orient="auto"` aligns
               with the line direction; `markerUnits="userSpaceOnUse"` keeps the
               arrow size fixed in graph space, independent of stroke width. -->
          <marker id="edge-arrow" viewBox="0 0 12 12" refX="11" refY="6"
                  markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L12,6 L0,12 Z" />
          </marker>
        </defs>
      </svg>
    </div>
  </template>

  <template id="tpl-empty">
    <div class="empty" role="status" aria-live="polite">
      <div class="empty-title" data-text="title"></div>
      <div class="empty-hint" data-slot="hint"></div>
    </div>
  </template>

  <template id="tpl-node">
    <article class="node">
  
      <div class="node-title" data-editable-title data-slot="title" data-text="title"></div>
      <div class="node-body">
        <div class="node-description" data-slot="description"></div>
      </div>
    </article>
  </template>

  <template id="tpl-modal">
    <div class="modal-layer">
      <div class="backdrop" data-command="modal.close" aria-hidden="true"></div>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <span id="modal-title" data-text="title"></span>
          <button class="modal-close icon" data-command="modal.close" aria-label="Close dialog" title="Close">×</button>
        </div>
        <div class="modal-body" data-slot="body"></div>
      </section>
    </div>
  </template>

  <template id="tpl-palette">
    <section class="palette">
      <input class="palette-search" placeholder="Search commands" autocomplete="off" autofocus>
      <div class="command-list" data-slot="commands"></div>
    </section>
  </template>

  <template id="tpl-command-section">
    <section class="command-section">
      <h3 data-text="group"></h3>
      <div data-slot="rows"></div>
    </section>
  </template>

  <template id="tpl-command-row">
    <button class="command-row">
      <span><b data-text="label"></b><small data-text="id"></small></span>
      <kbd data-text="shortcut"></kbd>
    </button>
  </template>

  <template id="tpl-help-row">
    <div class="help-row">
      <span><b data-text="label"></b><small data-text="id"></small></span>
      <input class="shortcut-edit editable-inline">
    </div>
  </template>

  <template id="tpl-properties">
    <section class="properties">
      <div data-slot="fields"></div>
    </section>
  </template>
</body>
</html>
